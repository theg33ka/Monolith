#These are intentionally all very mediocre as locational damage does not exist yet. Without it, armor values will stack in a way that makes it really god damn hard to determine how effective something is, along with making players extremely tanky.
#When it DOES exist, the values here should be totally reworked - probably just port them from SS13.

#ERT Mail Carrier Helmet
- type: entity
  parent: ClothingHeadHelmetBasic
  id: ClothingHeadHelmetERTMailCarrier
  name: ERT mail carrier helmet
  description: An in-atmosphere helmet worn by mail members of the Colonial Emergency Response Team. Has dark purple highlights.
  components:
  - type: Sprite
    sprite: _NF/Clothing/Head/Helmets/ert_mailcarrier.rsi
  - type: Clothing
    sprite: _NF/Clothing/Head/Helmets/ert_mailcarrier.rsi
  - type: Armor # Forge-change
    modifiers:
      coefficients:
        Blunt: 0.8 # 0.9 -> 0.8 Forge-change
        Slash: 0.8 # 0.9 -> 0.8 Forge-change
        Piercing: 0.8 # 0.9 -> 0.8 Forge-change
        Heat: 0.8 # 0.9 -> 0.8 Forge-change

