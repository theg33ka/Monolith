- type: entity
  id: ShieldGeneratorFSG90
  parent: ShieldGeneratorSmall
  name: FSG-90 "Sprint" Shield Generator
  description: An entry-level shield generator tuned for low draw and quick recovery after overloads.
  components:
  - type: ShipShieldEmitter
    healPerSecond: 65
    damageExp: 1.25
    baseDraw: 12000
    maxDraw: 38000
    unpoweredBonus: 4
    damageLimit: 3600
    damageOverloadTimePunishment: 35
    shieldColor: "#4CE5B1"
    collisionResistanceMultiplier: 0.75
  - type: Sprite
    sprite: _Mono/Structures/ShuttleComponents/shield.rsi
    snapCardinals: true
    layers:
    - state: control
    - state: control_on
      shader: unshaded
      map: ["enum.PowerDeviceVisualLayers.Powered"]
      visible: false
      color: "#4CE5B1"
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 1400
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:ExplodeBehavior
      - !type:SpawnGasBehavior
        gasMixture:
          volume: 1000
          moles:
          - 194
          - 0
          - 0
          - 6
          temperature: 752.48
    - trigger:
        !type:DamageTrigger
        damage: 350
      behaviors:
      - !type:SpawnEntitiesBehavior
        spawn:
          SheetSteel1:
            min: 1
            max: 2
      - !type:DoActsBehavior
        acts: ["Destruction"]
  - type: Explosive
    explosionType: Default
    maxIntensity: 4000
    intensitySlope: 4
    totalIntensity: 220
  - type: ApcPowerReceiver
    powerLoad: 12000
  - type: PointLight
    enabled: false
    castShadows: true
    radius: 2
    energy: 1.5
    color: "#4CE5B1"
  - type: Machine
    board: MachineShieldFSG90Circuitboard
  - type: ShipRepairable
    repairTime: 15
    repairCost: 90

