- type: entity
  id: ShieldGeneratorFSG90R
  parent: ShieldGeneratorSmall
  name: FSG-90R "Spark" Shield Generator
  description: A rapid-cycle shield generator with a light reserve and a fast return to service after overloads.
  components:
  - type: ShipShieldEmitter
    healPerSecond: 105
    damageExp: 1.22
    baseDraw: 19000
    maxDraw: 58000
    unpoweredBonus: 5
    damageLimit: 4300
    damageOverloadTimePunishment: 55
    shieldColor: "#58C6FF"
    collisionResistanceMultiplier: 0.6
  - type: Sprite
    sprite: _Mono/Structures/ShuttleComponents/shield.rsi
    snapCardinals: true
    layers:
    - state: control
    - state: control_on
      shader: unshaded
      map: ["enum.PowerDeviceVisualLayers.Powered"]
      visible: false
      color: "#58C6FF"
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 1450
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:ExplodeBehavior
      - !type:SpawnGasBehavior
        gasMixture:
          volume: 1000
          moles:
          - 194
          - 0
          - 0
          - 6
          temperature: 752.48
    - trigger:
        !type:DamageTrigger
        damage: 450
      behaviors:
      - !type:SpawnEntitiesBehavior
        spawn:
          SheetSteel1:
            min: 1
            max: 2
      - !type:DoActsBehavior
        acts: ["Destruction"]
  - type: Explosive
    explosionType: Default
    maxIntensity: 4000
    intensitySlope: 4
    totalIntensity: 280
  - type: ApcPowerReceiver
    powerLoad: 19000
  - type: PointLight
    enabled: false
    castShadows: true
    radius: 2
    energy: 1.5
    color: "#58C6FF"
