#region Laser bolts
# Pistols / SMGs
- type: entity
  id: ForgeBulletLaserLow
  parent: ForgeBaseBulletLaser
  categories: [ HideSpawnMenu ]
  components:
  - type: Projectile
    impactEffect: BulletImpactEffectOrangeDisabler
    damage:
      types:
        Heat: 13.5 # Corvax-Forge: Weaponary update
    armorPenetration: 0.1 # Forge-Change

- type: entity
  id: ForgeBulletLaserLowMed # Corvax-Forge: Weaponary update
  parent: ForgeBaseBulletLaser
  categories: [ HideSpawnMenu ]
  components:
  - type: Projectile
    impactEffect: BulletImpactEffectOrangeDisabler
    damage:
      types:
        Heat: 16.5 # Corvax-Forge: Weaponary update
    armorPenetration: 0.15 # Forge-Change

# Assault Rifles / Carbines
- type: entity
  id: ForgeBulletLaserPractice
  parent: ForgeBaseBulletLaser
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: Objects/Weapons/Guns/Projectiles/projectiles_tg.rsi
    layers:
    - state: omnilaser_greyscale
      shader: unshaded
      color: green
  - type: Projectile
    impactEffect: BulletImpactEffectOrangeDisabler
    damage:
      types:
        Heat: 0

- type: entity
