#region Disabler bolts
- type: entity
  parent: BulletDisabler
  id: ForgeBulletDisablerStaminaOnly
  name: disabler bolt
  categories: [ HideSpawnMenu ]
  components:
  - type: Projectile
    impactEffect: BulletImpactEffectDisabler
    damage:
      types:
        Heat: 0
    soundHit:
      collection: WeakHit
    forceSound: true

- type: entity
  id: ForgeBulletDisabler
  name: disabler bolt
  parent: BulletDisabler
  categories: [ HideSpawnMenu ]
  components:
  - type: Projectile
    impactEffect: BulletImpactEffectDisabler
    damage:
      types:
        Heat: 2
    soundHit:
      collection: WeakHit
    forceSound: true
  - type: StaminaDamageOnCollide
    damage: 18

- type: entity
  id: ForgeBulletDisablerLow
  name: disabler bolt
  parent: BulletDisabler
  categories: [ HideSpawnMenu ]
  components:
  - type: Projectile
    impactEffect: BulletImpactEffectDisabler
    damage:
      types:
        Heat: 1
    soundHit:
      collection: WeakHit
    forceSound: true
  - type: StaminaDamageOnCollide
    damage: 14

#region Kinetic bolts
- type: entity
  id: ForgeBulletKineticLowPower
  name: kinetic bolt
  parent: BulletKinetic
  categories: [ HideSpawnMenu ]
  components:
  - type: Projectile
    impactEffect: BulletImpactEffectKinetic
    damage:
      types:
        Blunt: 10
        Structural: 30
  - type: Ammo
    muzzleFlash: HitscanEffect
  - type: TimedDespawn
    lifetime: 1.5
  - type: PointLight
    radius: 2.5
    color: white
    energy: 0.5
  - type: GatheringProjectile
  - type: MiningGatheringSoft

- type: entity
  id: ForgeBulletKineticMediumPower
  name: kinetic bolt
  parent: ForgeBulletKineticLowPower
  categories: [ HideSpawnMenu ]
  components:
  - type: Projectile
    impactEffect: BulletImpactEffectKinetic
    damage:
      types:
        Blunt: 13
        Structural: 30

- type: entity
  id: ForgeBulletKineticHighPower
  name: kinetic bolt
  parent: ForgeBulletKineticLowPower
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    layers:
    - state: chronobolt
      shader: unshaded
      color: "#ffffff"
      scale: 1.2,1.2
  - type: Projectile
    impactEffect: BulletImpactEffectKinetic
    damage:
      types:
        Blunt: 18
        Structural: 30
  - type: PointLight
    color: "#ffffff"
  - type: MiningGatheringHard

