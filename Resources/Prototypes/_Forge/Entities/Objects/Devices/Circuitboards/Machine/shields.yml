- type: entity
  id: MachineShieldFSG90Circuitboard
  parent: BaseMachineCircuitboard
  name: FSG-90 shield generator board
  description: A machine board for an FSG-90 shield generator.
  components:
  - type: Sprite
    state: security
  - type: MachineBoard
    prototype: ShieldGeneratorFSG90
    componentRequirements:
      AmeFuelContainer:
        amount: 2
        defaultPrototype: AmeJar
    stackRequirements:
      Glass: 8
      Steel: 8
      Plasma: 20
      Plasteel: 8

